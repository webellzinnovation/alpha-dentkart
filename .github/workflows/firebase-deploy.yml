name: Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint || echo "Lint failed but continuing for now"
      
      - name: Run tests
        run: npm test -- --run
      
      - name: Build frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build
      
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: test_and_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALPHADENTKART_001 }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "$GCP_SA_KEY" > sa.json
            export GOOGLE_APPLICATION_CREDENTIALS="sa.json"
            firebase deploy --only hosting --project alphadentkart-001
          else
            firebase deploy --only hosting --project alphadentkart-001 --token "$FIREBASE_TOKEN"
          fi

  deploy-functions:
    runs-on: ubuntu-latest
    needs: test_and_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      
      - name: Install Functions dependencies
        working-directory: ./functions
        run: npm ci
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALPHADENTKART_001 }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "$GCP_SA_KEY" > sa.json
            export GOOGLE_APPLICATION_CREDENTIALS="sa.json"
            firebase deploy --only functions --project alphadentkart-001
          else
            firebase deploy --only functions --project alphadentkart-001 --token "$FIREBASE_TOKEN"
          fi
