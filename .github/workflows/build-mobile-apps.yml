name: Build Mobile Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-pixpfhd4qa-el.a.run.app/api/v1' }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Delete Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name.includes('android-apk') || artifact.name.includes('ios-build')) {
                console.log(`Deleting artifact: ${artifact.name} (${artifact.id})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_id }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk

  build_ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-pixpfhd4qa-el.a.run.app/api/v1' }}

      - name: Add iOS Platform
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Find iOS Workspace
        id: find-workspace
        run: |
          echo "Looking for workspace..."
          find ios -name "*.xcworkspace" -not -path "*/project.xcworkspace" -type d || true
          find ios -name "*.xcodeproj" -type d || true

      - name: Build iOS (Debug)
        env:
          scheme: App
          configuration: Debug
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/project.xcworkspace" -type d | head -1)
          echo "Using workspace: $WORKSPACE"
          cd ios/App
          xcodebuild -workspace "$WORKSPACE" -scheme "$scheme" -configuration $configuration -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16' -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Build iOS (Release)
        env:
          scheme: App
          configuration: Release
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/project.xcworkspace" -type d | head -1)
          echo "Using workspace: $WORKSPACE"
          cd ios/App
          xcodebuild -workspace "$WORKSPACE" -scheme "$scheme" -configuration $configuration -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16' -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_id }}
          path: ios/App/build/Build/Products
