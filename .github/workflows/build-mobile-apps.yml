name: Build Android and iOS Apps (Capacitor)
'on':
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main
jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm rebuild

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-pixpfhd4qa-el.a.run.app/api/v1' }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-dentkart-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build_ios:
    name: Build iOS App Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm rebuild

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-pixpfhd4qa-el.a.run.app/api/v1' }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # We build for simulator to skip complex manual code signing for quick artifact generation.
      # To build a production .ipa for the App Store, you will need to add Apple Certs to GitHub Secrets.
      - name: Build Xcode Project (Simulator)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator build -derivedDataPath build

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-dentkart-ios-app
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
