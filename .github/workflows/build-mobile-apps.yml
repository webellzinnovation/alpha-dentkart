name: Build Mobile Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-pixpfhd4qa-el.a.run.app/api/v1' }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk

  build_ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-pixpfhd4qa-el.a.run.app/api/v1' }}

      - name: Add iOS Platform
        run: |
          rm -rf ios
          npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install CocoaPods
        run: |
          ls -la ios/App/
          pod install --project-directory=ios/App

      - name: Build iOS (Debug)
        env:
          scheme: alphadentkart
          configuration: Debug
          platform: iOS Simulator
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme $scheme -configuration $configuration -platform $platform -destination 'generic/platform=iOS Simulator' -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Build iOS (Release)
        env:
          scheme: alphadentkart
          configuration: Release
          platform: iOS Simulator
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme $scheme -configuration $configuration -platform $platform -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/App/build/Build/Products
